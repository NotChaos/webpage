<!DOCTYPE html>
<html>
<head>
	<title>My Website</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			overflow: hidden;
		}
		video {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
		.overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			background-color: rgba(0, 0, 0, 0.5);
			color: #fff;
			font-size: 3em;
			text-align: center;
			opacity: 0;
			transition: opacity 1s ease-in-out;
		}
		video.ended + .overlay {
			opacity: 1;
		}
	</style>
</head>
<body>
	<video src="myvideo.mp4" autoplay muted class="ended"></video>
	<div class="overlay">Welcome to my website</div>
	<script>
		var video = document.querySelector("video");
		video.addEventListener("ended", function() {
			video.classList.add("ended");
		});
	</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Chaos homepage</title>
  <link href="style.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 3em;
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    video.ended + .overlay {
      opacity: 1;
    }
  </style>
</head>
<body>
  <video src="/downloads/Chaos.mp4" autoplay muted class="ended"></video>
  <div class="overlay">Welcome to my website</div>
  <script>
    var video = document.querySelector("video");
    var overlay = document.querySelector(".overlay");

    video.addEventListener("ended", function() {
      setTimeout(function() {
        video.classList.add("ended");
        overlay.textContent = "Chaoticmaster";
        setTimeout(function() {
          overlay.innerHTML = "<h3>Who am i?</h3><h4>I am a person who likes to develop things for fun :)</h4><h4>and i can program with multiple languages something simple.</h4><h2>Programming languages i know:</h2><h3>Java</h3><h4>I currently have 2 projects with making a server Plugin for Minecraft (Paper 1.17.1 and Spigot 1.18.2)</h4><h3>html</h3><h4>I already made this website but not more so my knowledge isn't really that high</h4><h3>Skript</h3><h4>This is a special type of coding language which is used for Minecraft to make a script which will be executed like a plugin and i have much knowledge of this programming language because i already used it over half a year</h4><h2>Do i sell my services?</h2><h3>No i wont sell anything without special conditions</h3><a download href='/downloads/Chaos.mp4'>click here to get a test file :)</a>";
          overlay.style.opacity = "1";
        }, 2000);
      }, 3000);
    });
  </script>
</body>
</html>
